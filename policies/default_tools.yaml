# Default Tool Policy — allowlists, blocklists, argument constraints
# Used by ToolFirewall (Layer 4) and PolicyEngine

version: "1.0"

# Tools explicitly allowed with optional argument constraints
allowed_tools:
  - name: "web_search"
    description: "Search the web for information"
    max_chain_depth: 3
    arg_constraints:
      query:
        type: string
        max_length: 500

  - name: "calculator"
    description: "Perform arithmetic calculations"
    max_chain_depth: 5
    arg_constraints:
      expression:
        type: string
        max_length: 200

  - name: "read_file"
    description: "Read a local file"
    max_chain_depth: 2
    arg_constraints:
      path:
        type: string
        blocked_patterns:
          - ".*\\.env$"
          - ".*\\.key$"
          - ".*password.*"
          - ".*secret.*"

  - name: "get_weather"
    description: "Get weather information"
    max_chain_depth: 3
    arg_constraints:
      location:
        type: string
        max_length: 100

  - name: "summarize_text"
    description: "Summarize a block of text"
    max_chain_depth: 2

# Tools blocked — never allowed regardless of context
blocked_tools:
  - name: "execute_shell"
    reason: "Direct shell execution is forbidden"
  - name: "run_command"
    reason: "Command execution is forbidden"
  - name: "eval"
    reason: "Code evaluation is forbidden"
  - name: "exec"
    reason: "Code execution is forbidden"
  - name: "os.system"
    reason: "OS-level command execution is forbidden"
  - name: "subprocess"
    reason: "Subprocess execution is forbidden"
  - name: "delete_database"
    reason: "Destructive database operations are forbidden"
  - name: "drop_table"
    reason: "Destructive database operations are forbidden"

# Default behavior for tools not in either list
default_action: "deny"  # deny | allow_with_warning | require_approval

# Global limits
global_limits:
  max_chain_depth: 5
  max_tools_per_request: 10
  max_arg_total_length: 5000
