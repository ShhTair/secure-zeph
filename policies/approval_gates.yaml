# Approval Gates Configuration
# Actions that require human approval before execution

version: "1.0"

# Tool categories that always require approval
require_approval:
  - tool_pattern: "send_email"
    reason: "Email sending requires explicit user confirmation"
    approval_timeout_seconds: 300

  - tool_pattern: "file_write"
    reason: "File writes require explicit user confirmation"
    approval_timeout_seconds: 300

  - tool_pattern: "api_call_external"
    reason: "External API calls require explicit user confirmation"
    approval_timeout_seconds: 300

  - tool_pattern: "database_write"
    reason: "Database mutations require user confirmation"
    approval_timeout_seconds: 300

  - tool_pattern: "transfer_funds"
    reason: "Financial operations require user confirmation"
    approval_timeout_seconds: 600

  - tool_pattern: "delete_*"
    reason: "Destructive operations require user confirmation"
    approval_timeout_seconds: 300

  - tool_pattern: "publish_*"
    reason: "Publishing operations require user confirmation"
    approval_timeout_seconds: 300

# Risk-based approval thresholds
risk_thresholds:
  # If risk_score > this AND tool is not in bypass list → require approval
  require_approval_above: 0.6
  # If risk_score > this → always block, no approval possible
  always_block_above: 0.9

# Tools that bypass approval (read-only / safe)
bypass_tools:
  - "web_search"
  - "calculator"
  - "get_weather"
  - "summarize_text"
  - "read_file"

# Alignment gate settings
alignment:
  # Intent categories that must match action categories
  strict_matching: false
  # Log all mismatches even if approved
  log_mismatches: true
